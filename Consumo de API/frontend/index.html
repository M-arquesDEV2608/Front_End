<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Genre of games</title>
    <link rel="stylesheet" href="style.css">
    <script src="scripit.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>🎮 Gênero de jogos</h1>
        <p class="subtitle">Consumindo a Games CEO API</p>
        
        <div class="genre-area">
            <img src="" alt="Jogo" id="gameImage">
            <div id="breedName"></div>
        </div>

        <div class="controls">
            <button id="randomBtn">🎰 Jogo Aleatório</button>
        </div>

        <div class="search">
            <input 
                type="text"
                id="breedInput"
                placeholder="Digite um gênero (ex: ação, sobrevivencia)"
            >
            <button id="searchBtn">🔎 Exeplorar</button>
        </div>
    </div>
</body>
</html>
